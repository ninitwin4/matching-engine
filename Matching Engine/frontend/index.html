<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MatchingEngine — demo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cobalt: { DEFAULT: "#2B3FE6", deep: "#1B2BA8" },
            flame: { DEFAULT: "#F0481E" },
            ink: "#14181F",
            muted: "#5B6470",
            hairline: "#E6E8EC",
          },
          fontFamily: {
            display: ['"Space Grotesk"', "system-ui", "sans-serif"],
            sans: ["Inter", "system-ui", "sans-serif"],
          },
        },
      },
    };
  </script>

  <style>
    html { -webkit-text-size-adjust: 100%; }
    body { font-family: Inter, system-ui, sans-serif; color: #14181F; background: #ffffff; }
    .font-display { font-feature-settings: "tnum" 1; } /* tabular numerals for scores */
    :focus-visible { outline: none; }
    .focus-ring:focus-visible {
      box-shadow: 0 0 0 2px #fff, 0 0 0 4px var(--accent);
      border-radius: 10px;
    }
    .dial-fill, .bar-fill { transition: stroke-dashoffset .6s cubic-bezier(.2,.7,.2,1), width .6s cubic-bezier(.2,.7,.2,1); }
    @media (prefers-reduced-motion: reduce) {
      .dial-fill, .bar-fill { transition: none !important; }
      * { scroll-behavior: auto !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel pinned to v7: its preset-react defaults to the classic runtime
       (React.createElement), which works in a classic <script>. v8 defaults to
       the automatic runtime and emits an illegal `import` here. -->
  <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
  <script src="./env.js"></script>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useMemo, useCallback } = React;
    const API_BASE = (window.API_BASE || "http://localhost:8000").replace(/\/$/, "");

    // Housing is cobalt-led. (Healthcare will flip the accent to flame — wired next.)
    const DOMAIN = {
      housing: { key: "housing", label: "Housing", note: "roommate matching",
                 accent: "#2B3FE6", accentDeep: "#1B2BA8" },
      healthcare: { key: "healthcare", label: "Healthcare", note: "therapist matching",
                 accent: "#F0481E", accentDeep: "#B4360F" },
    };

    // ---- API ----
    async function getProfiles(domain) {
      const r = await fetch(`${API_BASE}/profiles?domain=${domain}`);
      if (!r.ok) throw new Error(`Couldn't load seekers (${r.status})`);
      return r.json();
    }
    async function postMatch(domain, seekerId) {
      const r = await fetch(`${API_BASE}/match`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ domain, seeker_id: seekerId }),
      });
      if (!r.ok) throw new Error(`Couldn't run the match (${r.status})`);
      return r.json();
    }

    // ---- housing presentation helpers ----
    const firstName = (id) => {
      const last = String(id).split("-").slice(1).join(" ") || id;
      return last.replace(/\b\w/g, (c) => c.toUpperCase());
    };
    const money = (b) => `$${b && b[0] != null ? b[0].toLocaleString() : "—"}–${b && b[1] != null ? b[1].toLocaleString() : "—"}`;
    const genderPref = (g) => ({ female_only: "women only", male_only: "men only", open_to_all: "open to all" }[g] || g);
    const traitsOf = (p) => {
      const t = [];
      if (p.cleanliness >= 4) t.push("tidy");
      if (p.noise <= 2) t.push("quiet");
      if (p.guests >= 4) t.push("social");
      if (p.homebody >= 4) t.push("homebody");
      if (p.sleep_time >= 4) t.push("night owl");
      return t.slice(0, 3);
    };
    const labelFor = (s) =>
      s >= 85 ? "Strong match" : s >= 70 ? "Good match" : s >= 55 ? "Worth a look" : "Long shot";

    // ---- healthcare presentation helpers ----
    const needWord = (s) => String(s || "").replace(/_/g, " ");
    const genderPrefHC = (g) => ({ female: "prefers a woman", male: "prefers a man", any: "any gender" }[g] || g);
    const effLevel = (f) => (f >= 0.75 ? "Effective" : f >= 0.25 ? "Neutral" : "Ineffective");
    const specialties = (c) =>
      Object.keys(c.effectiveness || {}).filter((k) => c.effectiveness[k] === "effective").map(needWord).slice(0, 3).join(", ") || "general";
    const idMatches = (comp) =>
      ["lgbtq_affirming", "cultural_concordance", "language_concordance"].filter((k) => comp && comp[k] >= 1).length;

    // ---- per-domain presentation (one engine, two domains) ----
    const present = {
      housing: {
        name: (p) => firstName(p.id),
        sub: (p) => `${p.location} · ${money(p.budget)}`,
        lead: (p) => `seeking a roommate in ${p.location}`,
        chips: (p) => [{ t: p.location, a: 1 }, { t: money(p.budget) }, { t: genderPref(p.gender_preference) }]
          .concat(traitsOf(p).map((x) => ({ t: x }))),
        bio: (p) => p.bio,
        candName: (c) => firstName(c.id),
        candSub: (c) => `${c.location} · ${money(c.budget)} · ${traitsOf(c).join(", ") || "—"}`,
        label: (m) => labelFor(m.display_score),
        loadingText: "Scoring matches — this calls the AI.",
      },
      healthcare: {
        name: (p) => p.name || p.id,
        sub: (p) => `${needWord(p.primary_need)} · ${p.state}`,
        lead: (p) => `looking for a therapist in ${p.state}`,
        chips: (p) => [
          { t: needWord(p.primary_need), a: 1 }, { t: p.insurance }, { t: p.population },
          { t: p.accepts_telehealth ? "telehealth ok" : "in-person only" }, { t: genderPrefHC(p.therapist_gender_pref) },
        ],
        bio: () => null,
        candName: (c) => c.name || c.id,
        candSub: (c) => `${specialties(c)} · ${c.insurance} · ${c.telehealth_only ? "telehealth only" : "in-person + telehealth"}`,
        label: (m) => `${effLevel(m.components.effectiveness)} fit`,
        loadingText: "Scoring matches…",
      },
    };
    const DEFAULT_SEEKER = { housing: "sf-priya", healthcare: "p-rivera" };

    // ---- small UI atoms ----
    function Checkerboard() {
      return (
        <div className="h-[7px] w-full rounded-[2px] mt-1" aria-hidden="true"
          style={{ backgroundImage: "repeating-conic-gradient(var(--accent) 0% 25%, transparent 0% 50%)", backgroundSize: "7px 7px" }} />
      );
    }

    function Chip({ children, tone }) {
      const base = "inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-medium";
      if (tone === "accent")
        return <span className={base + " text-white"} style={{ background: "var(--accent)" }}>{children}</span>;
      return <span className={base + " bg-slate-100 text-slate-600"}>{children}</span>;
    }

    function ScoreDial({ score, size = 72 }) {
      const stroke = 6, r = (size - stroke) / 2, c = 2 * Math.PI * r;
      const pct = Math.max(0, Math.min(100, score)) / 100;
      return (
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} className="shrink-0" role="img"
          aria-label={`Score ${Math.round(score)} out of 100`}>
          <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="#E6E8EC" strokeWidth={stroke} />
          <circle className="dial-fill" cx={size / 2} cy={size / 2} r={r} fill="none" stroke="var(--accent)"
            strokeWidth={stroke} strokeLinecap="round" strokeDasharray={c}
            strokeDashoffset={c * (1 - pct)} transform={`rotate(-90 ${size / 2} ${size / 2})`} />
          <text x="50%" y="50%" dominantBaseline="central" textAnchor="middle"
            className="font-display" style={{ fontWeight: 700, fontSize: size * 0.3, fill: "#14181F" }}>
            {Math.round(score)}
          </text>
        </svg>
      );
    }

    // ---- score composition (the signature element) ----
    function ScoreComposition({ m, domain, seeker }) {
      return domain === "healthcare"
        ? <HealthcareComposition m={m} seeker={seeker} />
        : <HousingComposition m={m} />;
    }

    function HealthcareComposition({ m, seeker }) {
      const need = needWord(seeker ? seeker.primary_need : "");
      const eff = m.components && m.components.effectiveness != null ? m.components.effectiveness : 0;
      const level = effLevel(eff);
      const dispPct = Math.max(0, Math.min(100, m.display_score));
      return (
        <div className="mt-4 border-t border-hairline pt-4">
          <div className="text-xs font-semibold uppercase tracking-wide text-muted">How this score is built</div>

          {/* complementary hero — strength fills need */}
          <div className="mt-3 flex items-center gap-2 flex-wrap">
            <span className="inline-flex items-center rounded-md px-2.5 py-1 text-sm font-semibold text-white" style={{ background: "var(--accent)" }}>
              {level} in {need}
            </span>
            <span className="text-xs text-muted">strength fills need — the dominant factor</span>
          </div>

          {/* bar led by the complementary score */}
          <div className="mt-3 h-3 w-full rounded-full bg-slate-100 overflow-hidden relative">
            <div className="bar-fill h-full absolute left-0 top-0 rounded-full" style={{ width: dispPct + "%", background: "var(--accent)" }} />
          </div>
          <div className="mt-2 text-sm text-muted">= Shown <b className="font-display text-ink">{m.display_score.toFixed(0)}</b> / 100</div>

          <div className="mt-3 flex flex-wrap gap-1.5">
            <Chip>effectiveness: {level.toLowerCase()}</Chip>
            <Chip>shared identity: {idMatches(m.components)} of 3</Chip>
            <Chip>filters passed: state · insurance · modality</Chip>
          </div>

          <p className="mt-3 text-xs text-muted">Deterministic engine score — this domain has no AI nuance step.</p>
        </div>
      );
    }

    function HousingComposition({ m }) {
      const finalAB = m.base_a_to_b + m.ai_adjustment;
      const finalBA = m.base_b_to_a + m.ai_adjustment;
      const adj = m.ai_adjustment;
      const positive = adj > 0, negative = adj < 0;
      const deltaColor = positive ? "var(--accent)" : negative ? "#F0481E" : "#94A3B8";
      const basePct = Math.max(0, Math.min(100, m.base_score));
      const dispPct = Math.max(0, Math.min(100, m.display_score));

      let rationale;
      if (m.degraded) rationale = "The AI step was unavailable, so the base score stands.";
      else if (!m.ai_applied) rationale = "Outside the top candidates — the AI nuance step wasn't applied to this pair.";
      else if (m.ai_rationale) rationale = m.ai_rationale;
      else rationale = "The bios added nothing the questionnaire didn't already capture.";

      return (
        <div className="mt-4 border-t border-hairline pt-4">
          <div className="text-xs font-semibold uppercase tracking-wide text-muted">How this score is built</div>

          {/* composition bar: base fill + AI delta segment */}
          <div className="mt-3 h-3 w-full rounded-full bg-slate-100 overflow-hidden relative">
            <div className="bar-fill h-full absolute left-0 top-0 rounded-full" style={{ width: basePct + "%", background: "#C7CCD6" }} />
            {positive && (
              <div className="bar-fill h-full absolute top-0 rounded-r-full"
                style={{ left: basePct + "%", width: (dispPct - basePct) + "%", background: "var(--accent)" }} />
            )}
            {negative && (
              <div className="bar-fill h-full absolute top-0"
                style={{ left: dispPct + "%", width: (basePct - dispPct) + "%", background: "#F0481E", opacity: .35 }} />
            )}
          </div>

          <div className="mt-2 flex flex-wrap items-center gap-x-3 gap-y-1 text-sm">
            <span className="text-muted">Base <b className="font-display text-ink">{m.base_score.toFixed(0)}</b></span>
            <span className="inline-flex items-center rounded-md px-2 py-0.5 text-xs font-semibold text-white"
              style={{ background: deltaColor }}>
              AI {adj > 0 ? "+" : adj < 0 ? "−" : "±"}{Math.abs(adj).toFixed(0)}
            </span>
            <span className="text-muted">= Shown <b className="font-display text-ink">{m.display_score.toFixed(0)}</b></span>
          </div>

          <figure className="mt-3 rounded-lg bg-slate-50 p-3">
            <div className="text-[10px] font-semibold uppercase tracking-wider text-muted">AI reasoning</div>
            <blockquote className="mt-1 text-sm leading-relaxed text-slate-700">{rationale}</blockquote>
          </figure>

          <p className="mt-3 text-xs text-muted">
            Their fit for your preferences <b className="font-display text-ink">{finalAB.toFixed(0)}</b> ·
            Your fit for theirs <b className="font-display text-ink">{finalBA.toFixed(0)}</b> →
            shown <b className="font-display text-ink">{m.display_score.toFixed(0)}</b> (the weaker side).
          </p>
        </div>
      );
    }

    function MatchCard({ m, rank, domain, seeker }) {
      const [open, setOpen] = useState(rank === 1);
      const c = m.candidate || {};
      const P = present[domain];
      return (
        <div className="rounded-xl border border-hairline bg-white shadow-sm">
          <button onClick={() => setOpen((o) => !o)} aria-expanded={open}
            className="focus-ring w-full flex items-center gap-4 p-4 text-left">
            <span className="font-display text-sm text-muted w-6 shrink-0">#{rank}</span>
            <div className="min-w-0 flex-1">
              <div className="flex items-center gap-2 flex-wrap">
                <span className="font-display font-semibold text-ink truncate">{P.candName(c)}</span>
                <Chip>{P.label(m)}</Chip>
              </div>
              <div className="mt-0.5 text-sm text-muted truncate">{P.candSub(c)}</div>
            </div>
            <ScoreDial score={m.display_score} />
            <svg className={"shrink-0 text-muted transition-transform " + (open ? "rotate-180" : "")} width="18" height="18" viewBox="0 0 20 20" fill="none" aria-hidden="true">
              <path d="M5 8l5 5 5-5" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" />
            </svg>
          </button>
          {open && <div className="px-4 pb-4"><ScoreComposition m={m} domain={domain} seeker={seeker} /></div>}
        </div>
      );
    }

    function SeekerRow({ p, active, onSelect, domain }) {
      const P = present[domain];
      return (
        <button onClick={() => onSelect(p.id)} aria-current={active}
          className={"focus-ring w-full text-left px-3 py-2.5 rounded-lg border-l-2 " +
            (active ? "bg-slate-50" : "border-l-transparent hover:bg-slate-50")}
          style={active ? { borderLeftColor: "var(--accent)" } : undefined}>
          <div className="font-medium text-ink text-sm">{P.name(p)}</div>
          <div className="text-xs text-muted">{P.sub(p)}</div>
        </button>
      );
    }

    function SeekerSummary({ p, domain }) {
      if (!p) return null;
      const P = present[domain];
      const bio = P.bio(p);
      return (
        <div className="rounded-xl border border-hairline bg-white p-4">
          <div className="flex items-baseline gap-2 flex-wrap">
            <h2 className="font-display text-lg font-bold text-ink">{P.name(p)}</h2>
            <span className="text-sm text-muted">{P.lead(p)}</span>
          </div>
          <div className="mt-3 flex flex-wrap gap-1.5">
            {P.chips(p).map((ch, i) => <Chip key={i} tone={ch.a ? "accent" : undefined}>{ch.t}</Chip>)}
          </div>
          {bio && <p className="mt-3 text-sm leading-relaxed text-slate-600">“{bio}”</p>}
        </div>
      );
    }

    function DomainToggle({ domain, onChange }) {
      const opt = (key) => {
        const active = domain === key;
        return (
          <button key={key} aria-pressed={active} onClick={() => onChange(key)}
            className={"focus-ring px-4 py-1.5 rounded-full text-sm font-medium transition-colors " +
              (active ? "text-white shadow-sm" : "text-ink hover:bg-slate-100")}
            style={active ? { background: "var(--accent)" } : undefined}>
            {DOMAIN[key].label}
          </button>
        );
      };
      return (
        <div className="inline-flex items-center gap-1 rounded-full border border-hairline p-1 bg-white">
          {opt("housing")}{opt("healthcare")}
        </div>
      );
    }

    function Loading({ domain }) {
      return (
        <div className="space-y-3" aria-live="polite">
          <p className="text-sm text-muted">{present[domain].loadingText}</p>
          {[0, 1, 2].map((i) => (
            <div key={i} className="rounded-xl border border-hairline bg-white p-4 flex items-center gap-4 animate-pulse">
              <div className="h-4 w-6 bg-slate-100 rounded" />
              <div className="flex-1 space-y-2"><div className="h-4 w-40 bg-slate-100 rounded" /><div className="h-3 w-56 bg-slate-100 rounded" /></div>
              <div className="h-[72px] w-[72px] bg-slate-100 rounded-full" />
            </div>
          ))}
        </div>
      );
    }

    function ErrorState({ message, onRetry }) {
      return (
        <div className="rounded-xl border border-flame/30 bg-flame/5 p-5">
          <p className="text-sm text-ink font-medium">Something went wrong</p>
          <p className="mt-1 text-sm text-muted">{message}</p>
          <p className="mt-1 text-xs text-muted">Is the API running at <code>{API_BASE}</code>?</p>
          <button onClick={onRetry} className="focus-ring mt-3 rounded-lg px-3 py-1.5 text-sm font-medium text-white" style={{ background: "var(--accent)" }}>
            Try again
          </button>
        </div>
      );
    }

    function App() {
      const [domain, setDomain] = useState("housing");
      const [profiles, setProfiles] = useState([]);
      const [selected, setSelected] = useState(null);
      const [result, setResult] = useState(null);
      const [phase, setPhase] = useState("init"); // init | ready | matching | error
      const [error, setError] = useState("");
      const accent = DOMAIN[domain];

      useEffect(() => {
        let live = true;
        setPhase("init"); setError(""); setResult(null);
        getProfiles(domain)
          .then((list) => {
            if (!live) return;
            setProfiles(list);
            const def = list.find((p) => p.id === DEFAULT_SEEKER[domain]) || list[0];
            setSelected(def ? def.id : null);
            setPhase("ready");
          })
          .catch((e) => { if (live) { setError(e.message); setPhase("error"); } });
        return () => { live = false; };
      }, [domain]);

      const runMatch = useCallback((id) => {
        if (!id) return;
        setPhase("matching"); setError(""); setResult(null);
        postMatch(domain, id)
          .then((res) => { setResult(res); setPhase("ready"); })
          .catch((e) => { setError(e.message); setPhase("error"); });
      }, [domain]);

      useEffect(() => { if (selected) runMatch(selected); }, [selected, runMatch]);

      const seeker = useMemo(() => profiles.find((p) => p.id === selected), [profiles, selected]);

      return (
        <div style={{ "--accent": accent.accent, "--accent-deep": accent.accentDeep }} className="min-h-screen">
          {/* header */}
          <header className="border-b border-hairline">
            <div className="mx-auto max-w-5xl px-4 sm:px-6 py-4 flex items-center justify-between gap-4">
              <div>
                <div className="font-display text-xl font-bold text-ink leading-none">MatchingEngine</div>
                <Checkerboard />
                <div className="mt-1 text-xs text-muted">one engine, two domains</div>
              </div>
              <DomainToggle domain={domain} onChange={setDomain} />
            </div>
          </header>

          <main className="mx-auto max-w-5xl px-4 sm:px-6 py-6 grid grid-cols-1 md:grid-cols-[260px_1fr] gap-6">
            {/* seeker list */}
            <aside className="md:sticky md:top-6 md:self-start">
              <div className="text-xs font-semibold uppercase tracking-wide text-muted mb-2">Choose a seeker</div>
              {phase === "init" ? (
                <div className="text-sm text-muted">Loading…</div>
              ) : (
                <div className="rounded-xl border border-hairline bg-white p-1.5 max-h-[70vh] overflow-auto">
                  {profiles.map((p) => (
                    <SeekerRow key={p.id} p={p} active={p.id === selected} onSelect={setSelected} domain={domain} />
                  ))}
                </div>
              )}
            </aside>

            {/* results */}
            <section className="space-y-5">
              <SeekerSummary p={seeker} domain={domain} />
              <div>
                <h3 className="font-display text-sm font-semibold text-ink mb-3">
                  Matches{result ? ` · ${result.matches.length} of ${result.pool_size}` : ""}
                </h3>
                {phase === "matching" && <Loading domain={domain} />}
                {phase === "error" && <ErrorState message={error} onRetry={() => runMatch(selected)} />}
                {phase === "ready" && result && result.matches.length === 0 && (
                  <div className="rounded-xl border border-hairline bg-white p-6 text-sm text-muted">
                    No matches in this market — everyone was filtered out or disqualified.
                  </div>
                )}
                {phase === "ready" && result && result.matches.length > 0 && (
                  <div className="space-y-3">
                    {result.matches.map((m, i) => <MatchCard key={m.candidate_id} m={m} rank={i + 1} domain={domain} seeker={seeker} />)}
                  </div>
                )}
              </div>
            </section>
          </main>

          <footer className="mx-auto max-w-5xl px-4 sm:px-6 py-8 text-xs text-muted">
            Synthetic demo data · one engine scoring two domains.
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
