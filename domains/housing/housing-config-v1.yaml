# Housing domain config v1 - first instance of the engine's config contract
# (ADR-003: this file is domain knowledge; the engine never hardcodes it)
# Decision owner: Ni Ni | Evidence and rationale: ADR-001 amendment 2026-06-12

domain: housing
version: 1

match_type: seeker_to_seeker   # seeker_to_listing is a future match type

# ---- Tier 0: filters (run before scoring; rejected pairs are never scored) ----
filters:
  location:
    type: exact_match
    vocabulary:            # controlled list, ADR-004 amendment 1
      - San Francisco
      - Oakland
      - Berkeley
      - San Jose
      - Daly City
      - Manhattan
      - Brooklyn
      - Queens
      - The Bronx
      - Staten Island
  gender:
    type: requirement_match
    identity_options: [female, male, self_describe]
    preference_options: [female_only, male_only, open_to_all]
    semantics: exact_match   # self_describe passes open_to_all only (ADR-004 §2)

# ---- Tier 1: hard constraints (violation -> base_score = 0, short-circuit) ----
hard_constraints:
  smoking:
    type: bidirectional_tolerance     # A.smoking vs B.smoking_ok, both directions
  pets:
    type: bidirectional_tolerance     # A.has_pet vs B.pets_ok, both directions
    allergy_override: true            # pet_allergy checks actual pets, never soft
  budget:
    type: interval_overlap
    graded_above_floor: true          # no overlap -> 0; thin overlap scores low (ADR-001)
    null_min_means: unbounded
  move_in_window:
    type: interval_overlap            # date ranges
  lease_term_months:
    type: interval_overlap            # month ranges

# ---- Tier 1: similarity scoring (weights sum to 1.00; decision 2026-06-12) ----
similarity:
  cleanliness:  { scale: [1, 5], weight: 0.30 }
  noise:        { scale: [1, 5], weight: 0.25 }
  guests:       { scale: [1, 5], weight: 0.20 }
  homebody:     { scale: [1, 5], weight: 0.15 }
  sleep_time:   { scale: [1, 5], weight: 0.10 }

base_score_range: [0, 90]

# ---- Tier 2: enrichment ----
ai_bonus:
  range: [-10, 10]          # hard-capped in code, not by prompt (ADR-001)
  applies_to: top_n
  top_n: 20
  scoring_focus: specificity_and_evidence   # reward behavioral commitments,
                                            # verifiable arrangements, third-party
                                            # attestation; ignore ritual keywords
                                            # ("clean and respectful") - see
                                            # ADR-001 amendment 2026-06-12

# ---- Display (ADR-004 §3) ----
scoring:
  directional: true          # compute and store A->B and B->A
  display_rule: minimum      # headline = min; detail view shows both

# ---- Deferred from v1 (do not implement; see ADR-001 amendment 2026-06-12) ----
deferred:
  - utilities            # listing-side attribute
  - bathroom_config      # listing-side attribute
  - age_range            # fair-housing review required before use
  - work_style           # fair-housing adjacent; occupancy-density derivation later
  - values_identity      # opt-in, self-declared only; future ADR
